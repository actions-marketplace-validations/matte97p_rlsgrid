site_name: rlsgrid
site_description: Row-Level Security test matrix + cross-tenant fuzz for Postgres/Supabase.
site_url: https://matte97p.github.io/rlsgrid/
repo_url: https://github.com/matte97p/rlsgrid
repo_name: matte97p/rlsgrid

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Config recipes: RECIPES.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
